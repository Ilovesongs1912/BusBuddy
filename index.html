<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBuddy</title>

    <link rel="stylesheet" href="css/style.css">
</head>


<body>

<header>

    <h1>
        <img src="bus2.jpg" alt="BusBuddy logo">
        BusBuddy
    </h1>

    <nav>
        <a href="index.html">Home</a>
        <a href="accounts.html">Accounts</a>
        <a href="signup.html">Sign Up</a>
    </nav>

</header>




  <main>

    <section class="hero">

        <div class="hero-grid">

            
            <div class="hero-left">

                <p class="eyebrow">Travel Made Simple</p>

                <h2>Welcome Back</h2>

                <p>
                    Log in to BusBuddy and pick up right where you left off.
                </p>

                <p class="switch-link-inline">
                    Don't have an account?
                    <a href="signup.html">Create account &rarr;</a>
                </p>

                <div class="promo-card">
                    <img src="George_Pig.jpg" alt="Passenger boarding a bus">
                    <div class="promo-overlay">
              
                    </div>
                </div>

            </div>

            
            <div class="hero-right">

                <img src="peppa.jpg" class="hero-image" alt="BusBuddy travel">

                <!-- Login Card -->

                <div class="profile-box">

                    <h3>Log In</h3>

                    <label for="loginUsername">Username</label>

                    <input
                    type="text"
                    id="loginUsername"
                    placeholder=""
                    >

                    <label for="loginPassword">Password</label>

                    <input
                    type="password"
                    id="loginPassword"
                    placeholder=""
                    >

                    <button onclick="login()">
                    Log In
                    </button>

                    <p class="switch-link">
                        Don't have an account? <a href="signup.html">Create one</a>
                    </p>

                </div>

            </div>

        </div>

</section>

</main>



<script src="js/script.js"></script>

</body>

</html>
