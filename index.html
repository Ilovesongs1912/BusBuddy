<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBuddy</title>

    <link rel="stylesheet" href="css/style.css">
</head>


<body>

<header>

    <h1>BusBuddy</h1>

    <nav>
        <a href="index.html">Home</a>
    </nav>

</header>


<main>

    <section class="hero">

        <h2>Welcome to BusBuddy</h2>

        <p>
            Offering stability for your daily commute.
        </p>


        <div class="profile-box">

            <h3>Create Your Profile</h3>

            <input 
                type="text" 
                id="username" 
                placeholder="Enter username"
            >

            <input 
                type="password" 
                id="profileLock" 
                placeholder="Create create a password"
            >


            <button onclick="createProfile()">
                Get Started!
            </button>

        </div>


    </section>

</main>


<script src="js/script.js"></script>

</body>

</html>
